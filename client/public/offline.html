<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Team Outing Expense Tracker</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f1f5f9;
        color: #0f172a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }
      main {
        max-width: 560px;
        border-radius: 28px;
        background: white;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
        border: 1px solid #e2e8f0;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }
      p {
        color: #475569;
        line-height: 1.6;
      }
      button {
        border: 0;
        border-radius: 18px;
        background: #020617;
        color: white;
        padding: 12px 18px;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        Team Outing Expense Tracker could not reach the network. Reconnect and refresh to load the latest outing data.
        If you opened the app earlier on this device, the installed PWA can usually show the cached app shell and last synced data.
      </p>
      <button onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
